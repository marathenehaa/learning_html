<body>
    <!-- Header Start -->
    <header>
        <nav>
            <a href="index.html">Home</a> |
            <a href="about.html">About us</a> |
            <a href="products.html">Products</a> |
            <a href="services.html">Services</a> |
            <a href="contact.html">Contact us</a> 
        </nav>
    </header>
    <br><br>
    <!-- Header end -->

    <section>
            <marquee bgcolor="pink" behavior="alternate" direction="right" height="50px"><h3>Welcome to Sweet Scoop Ice Cream Shop</h3></marquee>
        </section>

    <fieldset>
        <legend>Contact Form</legend>

    <h2>&#127846; Contact Us</h2>

    <form>

        <label>&#128100; Full Name:</label><br>
        <input type="text" name="fullname" placeholder="Enter your full name"><br><br>

        <label>&#128231; Email Address:</label><br>
        <input type="email" name="email" placeholder="Enter your email"><br><br>

        <label>&#128222; Phone Number:</label><br>
        <input type="tel" name="phone" placeholder="Enter your phone number"><br><br>

        <label>&#127846; Favorite Ice Cream Flavor:</label><br>
        <select name="flavor">
            <option>Vanilla</option>
            <option>Chocolate</option>
            <option>Strawberry</option>
            <option>Mango</option>
            <option>Butterscotch</option>
            <option>Black Currant</option>
        </select><br><br>

        <label>&#128172; Message:</label><br>
        <textarea name="message" rows="5" cols="30" placeholder="Write your message"></textarea><br><br>

        <section>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15386.408367938788!2d73.78257977486506!3d18.626782950799427!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc2b9ba9ff8681f%3A0x1693d6e9f4d1d4ab!2sElpro%20City%20Square%20Mall!5e0!3m2!1sen!2sin!4v1784738444734!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>
        </section>
        <br><br>

        <input type="submit" value="Send">
        <input type="reset" value="Reset">

    </form>
    </fieldset>
</body>
</html>
