<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact Page</title>
     <link rel="icon" type="image/x-icon" href="images/flower.jpg">
</head>
<body>
    <!-- Header Start -->
    <header>
        <nav>
            <a href="index.html">Home</a> |
            <a href="about.html">About us</a> |
            <a href="products.html">Products</a> |
            <a href="services.html">Services</a> |
            <a href="contact.html">Contact us</a> |
            <a href="https://www.facebook.com/login/?next=https%3A%2F%2Fwww.facebook.com%2F" target="_blank">Facebook</a> |
        </nav>
    </header>
    <!-- Header end -->
     <hr>
     <main>
        <fieldset>
        <legend><b>Contact Page</b></legend>
        <!-- form start -->
        <form>
            <!-- Fist name -->
        <label>Enter First Name:</label>
        <input type="text" placeholder="Enter First Name">
        <br><br>

        <!-- Last name -->
        <label>Enter Last Name:</label>
        <input type="text" placeholder="Enter Last Name">
        <br><br>

        <!-- Email -->
        <label>Enter Email ID:</label>
        <input type="email" placeholder="Enter Last Name">
        <br><br>

        <!-- Phone no -->
        <label>Enter Phone No:</label>
        <input type="number" placeholder="Phone No">
        <br><br>

        <label>Enter Password</label>
        <input type="password" placeholder="Enter Password">
        <br><br>

        <label>Date of Birth</label>
        <input type="date">
        <br><br>
        <label>Month</label>
        <input type="month">
        <br><br>
        <label>Week</label>
        <input type="week">
        <br><br>
        <label>Time</label>
        <input type="time">
        <br><br>
        <label>Date and Time</label>
        <input type="datetime-local">
        <br><br>

        <label>Upload Files</label>
        <input type="file" multiple/>
        <br><br>

        <label>Search</label>
        <input type="search">
        <br><br>

        <label>Enter URL</label>
        <input type="url">
        <br><br>

        <label>Enter Telephone</label>
        <input type="tel">
        <br><br>

        <label>Choose Cities</label>
        <input type="checkbox">Mumbai
        <input type="checkbox">Pune
        <input type="checkbox">Bangalore
        <input type="checkbox">Delhi
        <br><br>

        <label>Select Gender</label>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        <input type="radio" name="gender">other
        <br><br>

        <h2>Reach us</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4660.902161791382!2d73.78518680395416!3d18.62791323044202!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc2b9ba9ff8681f%3A0x1693d6e9f4d1d4ab!2sElpro%20City%20Square%20Mall!5e0!3m2!1sen!2sin!4v1784702996600!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>
        <br><br>

        

        <input type="submit" value="Submit Form">
        <input type="button" value="Submit Form">
        <input type="reset" value="Reset Form">
        </form>
        <!-- form end -->
    </fieldset>
     </main>
</body>
</html>
