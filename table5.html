<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Average Height and Weight Table</h2>
    <table border="2">
        <thead>
            <tr>
                <th rowspan="2">Gender</th>
                <th colspan="2">Average</th>
                <th rowspan="2">Red Eyes</th>
            </tr>

            <tr>
                <th>Height(feet)</th>
                <th>Weight(kg)</th>
            </tr>

            <tr>
                <th>Males</th>
                <td>6.0</td>
                <td>70</td>
                <td>40%</td>
            </tr>

            <tr>
                <th>Females</th>
                <td>5.5</td>
                <td>75</td>
                <td>43%</td>
            </tr>
        </thead>
    </table>
</body>
</html>
