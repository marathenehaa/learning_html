<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>All Input Types</h2>
    <form>
        <!-- Fist name -->
        <label>Enter First Name:</label>
        <input type="text" placeholder="Enter First Name">
        <br><br>

        <!-- Last name -->
        <label>Enter Last Name:</label>
        <input type="text" placeholder="Enter Last Name">
        <br><br>

        <!-- Email -->
        <label>Enter Email ID:</label>
        <input type="email" placeholder="Enter Last Name">
        <br><br>

        <!-- Phone no -->
        <label>Enter Phone No:</label>
        <input type="number" placeholder="Phone No">
        <br><br>

        <label>Enter Password</label>
        <input type="password" placeholder="Enter Password">
        <br><br>

        <label>Date of Birth</label>
        <input type="date">
        <br><br>
        <label>Month</label>
        <input type="month">
        <br><br>
        <label>Week</label>
        <input type="week">
        <br><br>
        <label>Time</label>
        <input type="time">
        <br><br>
        <label>Date and Time</label>
        <input type="datetime-local">
        <br><br>

        <label>Select Color</label>
        <input type="color">
        <br><br>

        <label>Range</label>
        <input type="range">
        <br><br>

        <label>Upload Files</label>
        <input type="file" multiple/>
        <br><br>

        <label>Search</label>
        <input type="search">
        <br><br>

        <label>Enter URL</label>
        <input type="url">
        <br><br>

        <label>Enter Telephone</label>
        <input type="tel">
        <br><br>

        <label>Choose Cities</label>
        <input type="checkbox">Mumbai
        <input type="checkbox">Pune
        <input type="checkbox">Bangalore
        <input type="checkbox">Delhi
        <br><br>

        <label>Select Gender</label>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        <input type="radio" name="gender">other
        <br><br>

        <label>Select Fav Sweet Dish</label>
        <select>
            <option>Choose...</option>
            <option>Tiramisu</option>
            <option>Gulabjam</option>
            <option>Ukadicha modak</option>
            <option>Chochlate cake</option>
            <option>Rasgulla</option>
            <option>moose cake</option>
            <option>Cheese cake</option>
        </select>
        <br><br>

        <textarea rows="5" cols="20"></textarea>
        <br><br>

        <input type="submit" value="Submit Form">
        <input type="button" value="Submit Form">
        <input type="reset" value="Reset Form">
        
    </form>
</body>
</html>
